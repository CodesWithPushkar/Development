        }

            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 5px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
            font-size: 0.9em;
        }
        .stats-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }
        .stat-item {
            text-align: center;
        }
        .stat-val {
            font-size: 1.5em;
            font-weight: bold;
            display: block;
        }
        .stat-label {
            font-size: 0.8em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .progress-bar-bg {
            background: #333;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 40px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--green));
            width: 0%;
            transition: width 0.5s ease;
        }
        .day-block {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.2s ease;
        }
        .day-block:hover {
            border-color: #555;
            transform: translateY(-2px);
        }
        .day-header {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .day-title { color: var(--accent); }
        .day-topic { color: #888; font-size: 0.9em; font-weight: normal; }
        
        .task-list { padding: 10px 0; }
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: rgba(255,255,255,0.05); }
        
        input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-radius: 4px;
            margin-right: 15px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        input[type="checkbox"]:checked {
            background-color: var(--green);
            border-color: var(--green);
        }
        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            left: 3px;
            top: -1px;
        }
        
        .task-content { flex-grow: 1; }
        .task-link {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            display: block;
        }
        .task-link:hover { color: var(--accent); }
        .task-meta {
            font-size: 0.75em;
            margin-top: 4px;
            display: block;
        }
        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
            font-weight: bold;
        }
        .tag-revise { background: rgba(255, 161, 22, 0.15); color: var(--accent); }
        .tag-new { background: rgba(10, 132, 255, 0.15); color: var(--blue); }

        .reset-section {
            text-align: center;
            margin-top: 50px;
        }
        .reset-btn {
            background: transparent;
            color: #666;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .reset-btn:hover { border-color: #888; color: #888; }
    </style>
</head>

    ];

    const container = document.getElementById('plan-container');

    function renderPlan() {
        container.innerHTML = '';
        let totalTasks = 0;
        let completedTasks = 0;

        plan.forEach(day => {
            const dayBlock = document.createElement('div');
            dayBlock.className = 'day-block';
            
            const header = document.createElement('div');
            header.className = 'day-header';
            header.innerHTML = `<span class="day-title">Day ${day.day}</span> <span class="day-topic">${day.topic}</span>`;
            dayBlock.appendChild(header);

            const taskList = document.createElement('div');
            taskList.className = 'task-list';

            day.tasks.forEach(task => {
                totalTasks++;
                const isChecked = localStorage.getItem(task.id) === 'true';
                if(isChecked) completedTasks++;

                const item = document.createElement('div');
                item.className = 'task-item';
                
                item.innerHTML = `
                    <input type="checkbox" id="${task.id}" ${isChecked ? 'checked' : ''} onchange="toggleTask('${task.id}')">
                    <div class="task-content">
                        <a href="${task.link}" target="_blank" class="task-link">${task.title}</a>
                        <span class="task-meta">
                            <span class="tag ${task.type === 'Revise' ? 'tag-revise' : 'tag-new'}">${task.type}</span>
                        </span>
                    </div>
                `;
                taskList.appendChild(item);
            });

            dayBlock.appendChild(taskList);
            container.appendChild(dayBlock);
        });

        // Update stats
        const percent = Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('completedCount').innerText = completedTasks;
        document.getElementById('percentCount').innerText = percent + '%';
    }

    function toggleTask(id) {
        const checkbox = document.getElementById(id);
        localStorage.setItem(id, checkbox.checked);
        renderPlan();
    }

    function resetProgress() {
        if(confirm("Are you sure you want to clear your progress? This cannot be undone.")) {
            localStorage.clear();
            renderPlan();
        }
    }

    renderPlan();
</script>
