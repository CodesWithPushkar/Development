<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Website</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"></script>
    
</head>
<body>
    <div id="signUp-div">
        <input type="text" name="username" id="signup-username" placeholder="Enter username">
        <input type="text" name="pass" id="signup-password" placeholder="Enter password">
        <button onclick="signUp()">Submit</button>
    </div>
    <div id="signIn-div">
        <input type="text" name="username" id="signin-username" placeholder="Enter username">
        <input type="text" name="pass" id="signin-password" placeholder="Enter password">
        <button onclick="signIn()">Submit</button>
    </div>

    <div id="getInfo"></div>
    <button onclick="logout()">Logout</button>



    <script>
        let issignIn = false;
        async function signUp(){
            const username = document.getElementById("signup-username").value;
            const pass = document.getElementById("signup-password").value;
            await axios.post("http://localhost:3000/signup", {
                username: username,
                pass: pass
            });
            alert("You are sign up");
            document.getElementById("signUp-div").style.display = "none";
        }

        async function signIn(){
            const username = document.getElementById("signin-username").value;
            const pass = document.getElementById("signin-password").value;
            const response = await axios.post("http://localhost:3000/signin", {
                username: username,
                pass: pass
            });
            const token = response.data.token;
            localStorage.setItem("token",token);
            issignIn = true;
            document.getElementById("signIn-div").style.display = "none";
           display();
        }

        async function display(){
            if(issignIn){
                console.log("We are here");
            const response = await axios.get("http://localhost:3000/me", {
                headers: {
                    token: localStorage.getItem("token")
                }
            });
            document.getElementById("getInfo").innerHTML = `Your Infomation: <br>Username: ${response.data.username}<br>Password: ${response.data.pass}`;
            }
            else document.getElementById("getInfo").innerHTML = "";
        }

        function logout(){
            localStorage.removeItem("token");
            issignIn = false;
            display();
            document.getElementById("signup-username").value = "";
            document.getElementById("signup-password").value = "";
            document.getElementById("signin-username").value = "";
            document.getElementById("signin-password").value = "";
            document.getElementById("signUp-div").style.display = "block";
            document.getElementById("signIn-div").style.display = "block";

        }
         display();

    </script>
    
</body>
</html>
